<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CS 战队风格偏好测试</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f2e8;
      --card: #ffffff;
      --card-alt: #fbf6ef;
      --text: #111827;
      --muted: #4b5563;
      --primary: #1f3a70;
      --accent: #b9551e;
      --shadow: 0 10px 20px rgba(17, 24, 39, 0.08);
      font-family: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", Tahoma, Geneva, Verdana, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .title {
      font-size: clamp(1.8rem, 2.2vw, 2.6rem);
      line-height: 1.1;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 6px 0 0;
      max-width: 640px;
      line-height: 1.6;
    }

    .author-line {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .author-link {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .author-link:hover {
      text-decoration: underline;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 24px;
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .progress-text {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-text:empty {
      display: none;
    }

    .progress-bar {
      flex: 1;
      height: 12px;
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--primary);
      transition: width 0.25s ease;
    }

    .question-title {
      font-size: 1.2rem;
      margin: 0 0 12px;
      line-height: 1.45;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-button {
      background: var(--card-alt);
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 8px;
      padding: 16px 18px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
      min-height: 72px;
      display: flex;
      align-items: center;
    }

    .option-button:hover {
      background: #f4e7d5;
      border-color: rgba(31, 59, 112, 0.25);
      transform: translateY(-1px);
    }

    .option-button.selected {
      background: rgba(31, 59, 112, 0.12);
      border-color: rgba(31, 59, 112, 0.6);
      box-shadow: inset 0 0 0 1px rgba(31, 59, 112, 0.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .button {
      border: none;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 0.98rem;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 6px 12px rgba(17, 24, 39, 0.08);
      transition: background 0.2s ease;
    }

    .button.secondary {
      background: rgba(17, 24, 39, 0.06);
      color: var(--text);
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .result-item {
      border-radius: 10px;
      padding: 12px 14px;
      background: #f8f9fb;
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .results.themed .result-item {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.84));
      border-color: rgba(17, 24, 39, 0.08);
      box-shadow: 0 8px 20px rgba(17, 24, 39, 0.06);
    }

    .team-hero {
      position: relative;
      overflow: hidden;
      min-height: 0;
      color: #fff !important;
      border: none !important;
      background-color: var(--team-secondary, #111827);
      background-image:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.18) 0, rgba(255, 255, 255, 0.18) 7%, transparent 8%),
        radial-gradient(circle at 84% 16%, rgba(255, 255, 255, 0.12) 0, rgba(255, 255, 255, 0.12) 9%, transparent 10%),
        linear-gradient(135deg, var(--team-primary, #1f3a70), var(--team-secondary, #111827) 58%, var(--team-accent, #b9551e));
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      box-shadow: 0 18px 34px rgba(17, 24, 39, 0.18);
    }

    .team-hero * {
      position: relative;
      z-index: 1;
    }

    .team-hero::before,
    .team-hero::after {
      content: '';
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(6px);
      opacity: 0.28;
      pointer-events: none;
    }

    .team-hero::before {
      width: 180px;
      height: 180px;
      right: -30px;
      bottom: -40px;
      background: radial-gradient(circle, rgba(255,255,255,0.55), transparent 70%);
    }

    .team-hero::after {
      width: 240px;
      height: 240px;
      left: -40px;
      top: 30px;
      background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 72%);
    }

    .team-hero-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
      gap: 24px;
      align-items: center;
      padding: 22px;
    }

    .team-hero-copy {
      display: grid;
      gap: 12px;
      padding: 0;
      max-width: 560px;
    }

    .team-copy-main {
      display: grid;
      gap: 12px;
    }

    .team-photo-panel {
      position: relative;
      width: min(100%, 336px);
      height: 336px;
      min-height: 336px;
      justify-self: end;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.22);
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
      box-shadow: 14px 18px 34px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }

    .team-player-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--photo-position, center top);
      transform: scale(var(--photo-scale, 1));
      display: block;
      filter: saturate(1.06) contrast(1.04);
    }

    .team-photo-label {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(8,12,24,0.5);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.92);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .team-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 500px;
    }

    .team-heading {
      display: grid;
      gap: 6px;
    }

    .team-badge {
      width: 78px;
      height: 78px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      backdrop-filter: blur(4px);
    }

    .team-logo-shell {
      width: 78px;
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      overflow: visible;
      flex: 0 0 auto;
    }

    .team-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
      filter: var(--team-logo-filter, drop-shadow(0 3px 8px rgba(0,0,0,0.25)));
    }

    .team-mini-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
    }

    .team-mini-rank {
      width: 24px;
      color: var(--muted);
      font-weight: 700;
    }

    .team-mini-logo-shell {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      overflow: visible;
      flex: 0 0 auto;
    }

    .team-mini-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
      filter: var(--team-mini-logo-filter, drop-shadow(0 2px 6px rgba(0,0,0,0.24)));
    }

    .team-kicker {
      margin: 0 0 4px;
      font-size: 0.86rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }

    .team-name {
      margin: 0;
      font-size: clamp(1.95rem, 2.8vw, 3rem);
      line-height: 0.98;
      letter-spacing: 0.02em;
      font-family: "Arial Black", "Segoe UI", "Microsoft YaHei UI", sans-serif;
      color: #fff;
      text-shadow: 0 4px 18px rgba(0,0,0,0.28);
    }

    .team-tagline {
      margin: 0;
      color: rgba(255,255,255,0.92);
      line-height: 1.42;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .team-description {
      position: relative;
      z-index: 1;
      margin: 0;
      color: rgba(255,255,255,0.96);
      line-height: 1.6;
      max-width: 560px;
      font-size: 1rem;
    }

    .team-meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      max-width: 560px;
    }

    .team-chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.88rem;
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .result-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .share-tip {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .share-inline-panel {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.78), rgba(255,255,255,0.62));
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .share-inline-title {
      margin: 0 0 6px;
      font-size: 0.98rem;
      font-weight: 800;
      color: var(--text);
    }

    .share-inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .share-inline-actions .button {
      flex: 1 1 180px;
    }

    .dimension-row {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .dimension-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .dimension-track {
      position: relative;
      height: 14px;
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.08);
      overflow: hidden;
    }

    .dimension-center {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      background: rgba(17, 24, 39, 0.25);
      transform: translateX(-50%);
    }

    .dimension-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 8px;
      background: var(--primary);
      transition: width 0.3s ease, left 0.3s ease;
    }

    .dimension-value {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    .error {
      color: #ffd9d9;
      background: rgba(255, 74, 74, 0.08);
      border: 1px solid rgba(255, 74, 74, 0.18);
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 12px 10px 24px;
      }

      .card {
        padding: 12px;
      }

      .question-title {
        font-size: 1.1rem;
      }

      .option-button {
        min-height: 64px;
        padding: 14px 15px;
        font-size: 1rem;
        line-height: 1.5;
      }

      .actions {
        justify-content: stretch;
        margin-top: 16px;
      }

      .button {
        width: auto;
        flex: 1 1 calc(50% - 6px);
        min-height: 48px;
        padding: 12px 14px;
        font-size: 1rem;
      }

      .result-view .header {
        display: none;
      }

      .result-view .page {
        padding: 8px 8px 18px;
      }

      .result-view .card {
        padding: 8px;
        margin-bottom: 12px;
      }

      .result-view .actions {
        position: static;
        bottom: auto;
        z-index: auto;
        padding-top: 0;
        background: none;
      }

      .result-view .result-item {
        padding: 10px;
      }

      .result-view .team-hero-layout {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: stretch;
        padding: 10px;
      }

      .result-view .team-hero-copy,
      .result-view .team-copy-main {
        gap: 10px;
        max-width: none;
      }

      .result-view .team-brand {
        gap: 10px;
        max-width: none;
        align-items: flex-start;
      }

      .result-view .team-heading {
        min-width: 0 !important;
        gap: 4px;
      }

      .result-view .team-logo-shell,
      .result-view .team-badge {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }

      .result-view .team-logo {
        width: 46px;
        height: 46px;
      }

      .result-view .team-name {
        font-size: clamp(1.6rem, 7vw, 2.2rem);
        line-height: 1.02;
      }

      .result-view .team-tagline {
        font-size: 0.96rem;
      }

      .result-view .team-description,
      .result-view .team-meta {
        max-width: none;
      }

      .result-view .team-description {
        font-size: 0.95rem;
        line-height: 1.52;
      }

      .result-view .team-chip {
        font-size: 0.84rem;
        padding: 6px 10px;
      }

      .result-view .team-photo-panel {
        width: 100%;
        height: 230px;
        min-height: 230px;
        justify-self: stretch;
      }

      .result-view .candidate-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .result-view .candidate-card .result-title {
        order: 1;
        margin-bottom: 0;
      }

      .result-view .candidate-card .share-inline-panel {
        order: 2;
        margin-top: 0;
      }

      .result-view .candidate-card #candidateList {
        order: 3;
        padding-left: 10px !important;
      }

      .result-view .share-inline-actions .button {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1 class="title">CS 主队偏好测试</h1>
        <p class="subtitle">10 道核心单选题，必要时自动加试，让结果更贴近你真正偏爱的队伍风格。</p>
        <p class="author-line">作者：<a class="author-link" href="https://space.bilibili.com/510972932" target="_blank" rel="noopener noreferrer">小凡Eric</a></p>
      </div>
      <div class="progress" aria-label="进度">
        <div class="progress-text" id="progressText">加载中…</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </header>

    <section class="card" id="surveyCard">
      <div id="contentArea">
        <p class="muted">正在读取问卷...</p>
      </div>
    </section>
  </main>

    function getTeamTheme(teamId) {
      return TEAM_VISUALS[teamId] || DEFAULT_UI_THEME;
    }

    function getLogoSources(logoValue) {
      if (!logoValue) return [];
      return Array.isArray(logoValue) ? logoValue.filter(Boolean) : [logoValue];
    }

    function getPrimaryLogoPath(theme) {
      return getLogoSources(theme?.logo)[0] || '';
    }

    function getLogoFallbacks(theme) {
      return getLogoSources(theme?.logo).slice(1).join('|');
    }

    function getPrimaryMiniLogoPath(theme) {
      return getLogoSources(theme?.miniLogo || theme?.logo)[0] || '';
    }

    function getMiniLogoFallbacks(theme) {
      return getLogoSources(theme?.miniLogo || theme?.logo).slice(1).join('|');
    }

    function getTeamPhotoSources(teamId, theme) {
      if (theme?.photo) return getLogoSources(theme.photo);
      if (!teamId) return ['assets/players/default-player.svg'];
      return [
        `assets/players/${teamId}.png`,

        `assets/players/${teamId}.svg`,
        'assets/players/default-player.svg'

    function getTeamBackgroundSources(teamId, theme) {
      const inferred = teamId ? [
        `assets/backgrounds/${teamId}.png`,
        `assets/backgrounds/${teamId}.webp`,
        `assets/backgrounds/${teamId}.jpg`,
        `assets/backgrounds/${teamId}.jpeg`,
        `assets/backgrounds/${teamId}.svg`
      ] : [];
      const declared = getLogoSources(theme?.bgImage);
      return [...new Set([...inferred, ...declared])];
    }

    function getBackgroundCssUrls(teamId, theme) {
      return getTeamBackgroundSources(teamId, theme).map(src => `url('${src}')`).join(', ');
    }

    function getPrimaryTeamPhotoPath(teamId, theme) {
      return getTeamPhotoSources(teamId, theme)[0] || '';
    }

    function getTeamPhotoFallbacks(teamId, theme) {
      return getTeamPhotoSources(teamId, theme).slice(1).join('|');
    }

    function handleLogoError(img) {
      const fallbacks = (img.dataset.fallbacks || '').split('|').filter(Boolean);
      if (fallbacks.length) {
        const nextPath = fallbacks.shift();
        img.dataset.fallbacks = fallbacks.join('|');
        img.src = nextPath;
        return;
      }

      img.style.display = 'none';
      const badge = img.parentNode?.querySelector('.team-badge');
      if (badge) badge.style.display = 'flex';
    }

    async function loadFirstAvailableImage(logoValue) {
      for (const src of getLogoSources(logoValue)) {
        try {
          return await loadImage(src);
        } catch {
          continue;
        }
      }
      return null;
    }

    function applyUiTheme(theme = DEFAULT_UI_THEME) {
      const activeTheme = theme || DEFAULT_UI_THEME;
      const root = document.documentElement;
      root.style.setProperty('--bg', activeTheme.pageBg || DEFAULT_UI_THEME.pageBg);
      root.style.setProperty('--card', activeTheme.card || '#ffffff');
      root.style.setProperty('--card-alt', activeTheme.cardAlt || '#fbf6ef');
      root.style.setProperty('--primary', activeTheme.uiPrimary || activeTheme.primary || DEFAULT_UI_THEME.primary);
      root.style.setProperty('--accent', activeTheme.uiAccent || activeTheme.accent || DEFAULT_UI_THEME.accent);
    }

    function createNode(html) {
      const template = document.createElement('template');
      template.innerHTML = html.trim();
      return template.content.firstChild;
    }

    function shuffleArray(items) {
      const array = [...items];
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createOptionOrders(questionList) {
      return questionList.map(question => shuffleArray(question.options.map((_, index) => index)));
    }

    function createQuestionOrder(questionList) {
      return shuffleArray(questionList.map((_, index) => index));
    }

    function buildRandomAnswers(questionList) {
      return questionList.map(question => Math.floor(Math.random() * question.options.length));
    }

    function showRandomPreview() {
      if (!surveyData?.questions?.length || !surveyData?.teams?.length) return;
      const teamIds = surveyData.teams.map(team => team.id).filter(Boolean);
      const candidateIds = lastRandomPreviewTeamId && teamIds.length > 1
        ? teamIds.filter(teamId => teamId !== lastRandomPreviewTeamId)
        : teamIds;
      previewTeamId = candidateIds[Math.floor(Math.random() * candidateIds.length)] || teamIds[0] || null;
      lastRandomPreviewTeamId = previewTeamId;
      hasStarted = false;
      currentPhase = 'base';
      currentIndex = 0;
      answers = buildRandomAnswers(surveyData.questions);
      tiebreakerQuestions = [];
      tiebreakerAnswers = [];
      tiebreakerQuestionOrder = [];
      tiebreakerOptionOrders = [];
      questionOrder = [];
      optionOrders = [];
      showResult();
    }

    function getActiveQuestionSet() {
      if (currentPhase === 'tiebreaker') {
        return {
          questions: tiebreakerQuestions,
          answersRef: tiebreakerAnswers,
          orderRef: tiebreakerQuestionOrder,
          optionOrdersRef: tiebreakerOptionOrders
        };
      }

      return {
        questions: surveyData.questions,
        answersRef: answers,
        orderRef: questionOrder,
        optionOrdersRef: optionOrders
      };
    }

    function renderStartScreen() {
      document.body.classList.remove('result-view');
      applyUiTheme();
      progressText.textContent = '准备开始';
      progressFill.style.width = '0%';
      contentArea.innerHTML = `
        <h2 class="question-title">欢迎来到 CS 主队测试</h2>
        <p class="subtitle" style="margin:0 0 10px;max-width:none;">通过 10 道核心题和少量加试题，测出你最接近的 CS 强队风格。</p>
        <p class="share-tip" style="margin:0 0 20px;">如果你在调结果页样式，也可以直接随机预览一份结果。</p>
        <div class="actions" style="justify-content:flex-start;">
          <button class="button" id="startSurveyButton">开始测试</button>
          <button class="button secondary" id="randomPreviewButton">随机结果展示</button>
        </div>
      `;

      document.getElementById('startSurveyButton').addEventListener('click', () => {
        previewTeamId = null;
        hasStarted = true;
        currentPhase = 'base';
        currentIndex = 0;
        answers = new Array(surveyData.questions.length).fill(null);
        tiebreakerQuestions = [];
        tiebreakerAnswers = [];
        tiebreakerQuestionOrder = [];
        tiebreakerOptionOrders = [];
        questionOrder = createQuestionOrder(surveyData.questions);
        optionOrders = createOptionOrders(surveyData.questions);
        renderQuestion();
      });

      document.getElementById('randomPreviewButton').addEventListener('click', () => {
        showRandomPreview();
      });
    }

    function renderQuestion() {
      document.body.classList.remove('result-view');
      const activeSet = getActiveQuestionSet();
      const total = activeSet.questions.length;
      const questionIndex = activeSet.orderRef[currentIndex] ?? currentIndex;
      const question = activeSet.questions[questionIndex];
      const completed = currentIndex;
      const percent = Math.round((completed / total) * 100);
      progressText.textContent = currentPhase === 'tiebreaker' ? `加试题 ${currentIndex + 1} / ${total}` : `第 ${currentIndex + 1} / ${total} 题`;
      progressFill.style.width = `${percent}%`;

      const displayTitle = question.title.replace(/^\d+\.\s*/, '');
      const displayOrder = activeSet.optionOrdersRef[questionIndex] || question.options.map((_, index) => index);
      const optionsHtml = displayOrder.map((optionIndex) => {
        const option = question.options[optionIndex];
        const selected = activeSet.answersRef[questionIndex] === optionIndex ? 'selected' : '';
        return `<button type="button" class="option-button ${selected}" data-index="${optionIndex}">${option.label}</button>`;
      }).join('');

      const helperText = currentPhase === 'tiebreaker'
        ? '<p class="subtitle" style="margin:0 0 14px;max-width:none;">你的几个结果很接近，补答几题来更精准区分主队。</p>'
        : '';

      contentArea.innerHTML = `
        ${helperText}
        <h2 class="question-title">${displayTitle}</h2>
        <div class="options" id="optionsContainer">${optionsHtml}</div>
        <div class="actions">
          <button class="button secondary" id="prevButton" ${currentIndex === 0 ? 'disabled' : ''}>上一题</button>
          <button class="button" id="nextButton">${currentIndex === total - 1 ? '提交结果' : '下一题'}</button>
        </div>
      `;

      document.querySelectorAll('.option-button').forEach(button => {
        button.addEventListener('click', () => {
          const selectedIndex = Number(button.dataset.index);
          activeSet.answersRef[questionIndex] = selectedIndex;
          renderQuestion();
        });
      });

      document.getElementById('prevButton').addEventListener('click', () => {
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuestion();
        }
      });

      document.getElementById('nextButton').addEventListener('click', () => {
        if (activeSet.answersRef[questionIndex] == null) {
          alert('请先选择一个选项再继续。');
          return;
        }
        if (currentIndex < total - 1) {
          currentIndex += 1;
          renderQuestion();
        } else if (currentPhase === 'base' && maybeStartTiebreakers()) {
          return;
        } else {
          showResult();
        }
      });
    }

    function calculateScores() {
      dimensionScores = surveyData.dimensions.reduce((acc, dimension) => {
        acc[dimension.id] = 0;
        return acc;
      }, {});

      const scoreQuestionSet = (questions, answerSet) => {
        questions.forEach((question, questionIndex) => {
          const answerIndex = answerSet[questionIndex];
          if (answerIndex == null) return;
          const optionScores = question.options[answerIndex].scores || {};
          const weight = question.weight || 1;
          surveyData.dimensions.forEach(dimension => {
            dimensionScores[dimension.id] += (optionScores[dimension.id] || 0) * weight;
          });
        });
      };

      scoreQuestionSet(surveyData.questions, answers);
      scoreQuestionSet(tiebreakerQuestions, tiebreakerAnswers);
    }

    function countStyleChoices() {
      return answers.reduce((acc, answerIndex, questionIndex) => {
        if (answerIndex == null) return acc;
        const option = surveyData.questions[questionIndex].options[answerIndex];
        const styleId = option.style || ['A', 'B', 'C', 'D'][answerIndex];
        if (styleId) {
          acc[styleId] = (acc[styleId] || 0) + 1;
        }
        return acc;
      }, { A: 0, B: 0, C: 0, D: 0 });
    }

    function getTotalQuestionWeight() {
      const getWeight = question => question.weight || 1;
      return surveyData.questions.reduce((sum, question) => sum + getWeight(question), 0)
        + tiebreakerQuestions.reduce((sum, question) => sum + getWeight(question), 0);
    }

    function normalizeScores() {
      const maxPerQuestion = surveyData.questionMaxScore || 5;
      const responseScale = surveyData.responseScale || maxPerQuestion;
      const totalPossible = getTotalQuestionWeight() * maxPerQuestion;
      return surveyData.dimensions.reduce((acc, dimension) => {
        const rawValue = dimensionScores[dimension.id] || 0;
        acc[dimension.id] = (rawValue / totalPossible) * responseScale;
        return acc;
      }, {});
    }

    function calculateTeamBonuses() {
      const addBonuses = (acc, questions, answerSet, scale = 1) => {
        questions.forEach((question, questionIndex) => {
          const answerIndex = answerSet[questionIndex];
          if (answerIndex == null) return;
          const option = question.options[answerIndex];
          const weight = question.weight || 1;
          Object.entries(option.teamBonus || {}).forEach(([teamId, bonus]) => {
            acc[teamId] = (acc[teamId] || 0) + bonus * weight * scale;
          });
        });
        return acc;
      };

      const bonusMap = {};
      const defaultScale = surveyData.teamBonusScale || 1;
      const questionScale = surveyData.questionTeamBonusScale || defaultScale;
      const tiebreakerScale = surveyData.tiebreakerTeamBonusScale || defaultScale;
      addBonuses(bonusMap, surveyData.questions, answers, questionScale);
      addBonuses(bonusMap, tiebreakerQuestions, tiebreakerAnswers, tiebreakerScale);
      return bonusMap;
    }

    function getDimensionWeights() {
      const baseWeights = {
        discipline: 1.08,
        weapon: 1.1,
        breakthrough: 1.14,
        setup: 1.18,
        tactics: 1.22,
        clutch: 1.14,
        economy: 1.08
      };
      const teams = surveyData.teams || [];
      const teamCount = Math.max(teams.length, 1);

      return surveyData.dimensions.reduce((acc, dimension) => {
        const values = teams.map(team => team.profile?.[dimension.id] || 0);
        const mean = values.reduce((sum, value) => sum + value, 0) / teamCount;
        const variance = values.reduce((sum, value) => sum + (value - mean) ** 2, 0) / teamCount;
        const varianceBonus = Math.min(0.45, variance / 80);
        acc[dimension.id] = (baseWeights[dimension.id] || 1) + varianceBonus;
        return acc;
      }, {});
    }

    function getSignatureBonus(userNormalized, item) {
      const profile = item.profile || {};
      const responseScale = surveyData.responseScale || surveyData.questionMaxScore || 5;
      const teamScale = surveyData.teamScale || responseScale;
      const maxGap = responseScale + teamScale;

      return surveyData.dimensions
        .map(dimension => ({
          id: dimension.id,
          teamValue: profile[dimension.id] || 0
        }))
        .filter(entry => Math.abs(entry.teamValue) >= 5)
        .sort((a, b) => Math.abs(b.teamValue) - Math.abs(a.teamValue))
        .slice(0, 3)
        .reduce((sum, entry) => {
          const userValue = userNormalized[entry.id] || 0;
          if (!userValue || Math.sign(userValue) !== Math.sign(entry.teamValue)) {
            return sum;
          }
          const closeness = 1 - Math.min(1, Math.abs(userValue - entry.teamValue) / maxGap);
          return sum + closeness * 1.2;
        }, 0);
    }

    function getTeamAdjustment(item) {
      const profile = item.profile || {};
      const averageIntensity = surveyData.dimensions.reduce((sum, dimension) => {
        return sum + Math.abs(profile[dimension.id] || 0);
      }, 0) / surveyData.dimensions.length;

      return {
        intensityCompensation: Math.max(0, averageIntensity - 3.2) * 1.25,
        popularityBias: item.popularityBias || 0,
        resultWeight: item.resultWeight || 1
      };
    }

    function calculateMatches(items, userNormalized, bonusMap = {}) {
      const responseScale = surveyData.responseScale || surveyData.questionMaxScore || 5;
      const teamScale = surveyData.teamScale || responseScale;
      const maxDistancePerDimension = responseScale + teamScale;
      const dimensionWeights = getDimensionWeights();
      const weightedMaxDistance = surveyData.dimensions.reduce((sum, dimension) => {
        return sum + (dimensionWeights[dimension.id] || 1) * maxDistancePerDimension;
      }, 0);

      return items.map(item => {
        const profile = item.profile || {};
        const distance = surveyData.dimensions.reduce((acc, dimension) => {
          const userValue = userNormalized[dimension.id] || 0;
          const teamValue = profile[dimension.id] || 0;
          const diffRatio = Math.abs(userValue - teamValue) / maxDistancePerDimension;
          const weight = (dimensionWeights[dimension.id] || 1) * 0.55;
          const shapedDistance = (diffRatio * 0.35 + diffRatio * diffRatio * 0.4) * maxDistancePerDimension;
          return acc + shapedDistance * weight;
        }, 0);

        const rawBonus = bonusMap[item.id] || 0;
        const positiveBonus = Math.pow(Math.max(0, rawBonus), 0.72) * 2.15;
        const antiPenalty = Math.pow(Math.max(0, -rawBonus), 0.72) * 1.75;
        const signatureBonus = getSignatureBonus(userNormalized, item) * 0.3;
        const adjustment = getTeamAdjustment(item);
        const adjustedDistance = Math.max(0, distance - positiveBonus - signatureBonus - adjustment.intensityCompensation * 0.35 - adjustment.popularityBias * 0.35 + antiPenalty);
        const styleSimilarity = Math.max(0, 1 - adjustedDistance / weightedMaxDistance);
        const bonusSimilarity = 1 - Math.exp(-Math.max(0, rawBonus) / 10);
        const penaltyCut = Math.min(0.4, Math.max(0, -rawBonus) / 30);
        const combinedSimilarity = Math.max(0, bonusSimilarity * 0.72 + styleSimilarity * 0.28 - penaltyCut);
        const similarity = Math.max(0, Math.min(0.965, (0.16 + combinedSimilarity * 0.76) * Math.min(1.02, adjustment.resultWeight)));
        return { ...item, similarity, baseSimilarity: styleSimilarity, distance: adjustedDistance };
      }).sort((a, b) => b.similarity - a.similarity);
    }

    function calculateTeamMatches(userNormalized) {
      return calculateMatches(surveyData.teams, userNormalized, calculateTeamBonuses());
    }

    function calculateStyleMatches(userNormalized) {
      return calculateMatches(surveyData.styles || [], userNormalized);
    }

    function getStabilityLabel(userNormalized) {
      const averagePull = surveyData.dimensions.reduce((sum, dimension) => {
        return sum + Math.abs(userNormalized[dimension.id] || 0);
      }, 0) / surveyData.dimensions.length;

      if (averagePull >= 4.2) return '高';
      if (averagePull >= 2.6) return '中';
      return '低';
    }

    function selectTiebreakers(teamMatches, stabilityLabel = '中') {
      const settings = surveyData.adaptive || {};
      const baseGap = settings.triggerGap ?? 0.05;
      const triggerGap = baseGap + (stabilityLabel === '低' ? 0.04 : stabilityLabel === '中' ? 0.02 : 0);
      const poolSize = settings.poolSize ?? 4;
      const maxQuestions = settings.maxQuestions ?? 3;

      if (!teamMatches?.length) return [];
      const leadScore = teamMatches[0].similarity;
      const secondScore = teamMatches[1]?.similarity ?? 0;
      const topTwoIds = teamMatches.slice(0, 2).map(team => team.id);
      const topTwoSet = new Set(topTwoIds);
      const closeTeams = teamMatches
        .filter((team, index) => index < poolSize && (leadScore - team.similarity) <= triggerGap)
        .map(team => team.id);

      const shouldRefine = closeTeams.length >= 2 || (leadScore - secondScore) <= (triggerGap + 0.015);
      if (!shouldRefine) {
        return [];
      }

      const candidateTeams = closeTeams.length >= 2 ? closeTeams : topTwoIds;
      const closeSet = new Set(candidateTeams);
      const extraQuestions = stabilityLabel === '低' ? 2 : stabilityLabel === '中' ? 1 : 0;

      return (surveyData.tiebreakers || [])
        .map(question => ({
          ...question,
          overlap: (question.targets || []).filter(teamId => closeSet.has(teamId)).length,
          topPairCoverage: (question.targets || []).filter(teamId => topTwoSet.has(teamId)).length
        }))
        .filter(question => question.overlap >= 2 || question.topPairCoverage === 2)
        .sort((a, b) => {
          if (b.topPairCoverage !== a.topPairCoverage) return b.topPairCoverage - a.topPairCoverage;
          if (b.overlap !== a.overlap) return b.overlap - a.overlap;
          return (b.weight || 1) - (a.weight || 1);
        })
        .slice(0, Math.min((surveyData.tiebreakers || []).length, maxQuestions + extraQuestions));
    }

    function maybeStartTiebreakers() {
      calculateScores();
      const preliminaryScores = normalizeScores();
      const preliminaryMatches = calculateTeamMatches(preliminaryScores);
      const stabilityLabel = getStabilityLabel(preliminaryScores);
      const selectedTiebreakers = selectTiebreakers(preliminaryMatches, stabilityLabel);

      if (!selectedTiebreakers.length) {
        return false;
      }

      currentPhase = 'tiebreaker';
      currentIndex = 0;
      tiebreakerQuestions = selectedTiebreakers;
      tiebreakerAnswers = new Array(selectedTiebreakers.length).fill(null);
      tiebreakerQuestionOrder = createQuestionOrder(selectedTiebreakers);
      tiebreakerOptionOrders = createOptionOrders(selectedTiebreakers);
      renderQuestion();
      return true;
    }

    function getConfidenceLabel(topMatch, secondMatch, stabilityLabel) {
      if (!topMatch) return '低';
      const gap = topMatch.similarity - (secondMatch?.similarity || 0);
      if (topMatch.similarity >= 0.75 && gap >= 0.08 && stabilityLabel === '高') return '高';
      if (topMatch.similarity >= 0.65 && gap >= 0.04 && stabilityLabel !== '低') return '中';
      return '低';
    }

    function isLeadingPunctuation(char) {
      return /[，。！？；：、）》】〕」』’”]/.test(char || '');
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const chars = Array.from(text || '');
      let line = '';
      let cursorY = y;

      chars.forEach(char => {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          if (isLeadingPunctuation(char)) {
            ctx.fillText(testLine, x, cursorY);
            line = '';
          } else {
            ctx.fillText(line, x, cursorY);
            line = char;
          }
          cursorY += lineHeight;
        } else {
          line = testLine;
        }
      });

      if (line) {
        ctx.fillText(line, x, cursorY);
        cursorY += lineHeight;
      }

      return cursorY;
    }

    function getWrappedLines(ctx, text, maxWidth) {
      const chars = Array.from(text || '');
      const lines = [];
      let line = '';

      chars.forEach(char => {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          if (isLeadingPunctuation(char)) {
            lines.push(testLine);
            line = '';
          } else {
            lines.push(line);
            line = char;
          }
        } else {
          line = testLine;
        }
      });

      if (line) lines.push(line);
      return lines;
    }

    function drawCenteredCanvasText(ctx, text, centerX, centerY) {
      const metrics = ctx.measureText(text);
      const ascent = metrics.actualBoundingBoxAscent || 0;
      const descent = metrics.actualBoundingBoxDescent || 0;
      const visualCenterOffset = (ascent - descent) / 2;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(text, centerX, centerY + visualCenterOffset);
      ctx.restore();
    }

    function drawGlassPanel(ctx, sourceCanvas, x, y, width, height, radius = 24) {
      ctx.save();
      drawRoundedRectPath(ctx, x, y, width, height, radius);
      ctx.clip();
      ctx.filter = 'blur(18px)';
      ctx.globalAlpha = 0.92;
      ctx.drawImage(sourceCanvas, -14, -14, sourceCanvas.width + 28, sourceCanvas.height + 28);
      ctx.restore();

      ctx.save();
      drawRoundedRectPath(ctx, x, y, width, height, radius);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();
      const glassSheen = ctx.createLinearGradient(x, y, x, y + height);
      glassSheen.addColorStop(0, 'rgba(255,255,255,0.24)');
      glassSheen.addColorStop(0.4, 'rgba(255,255,255,0.11)');
      glassSheen.addColorStop(1, 'rgba(255,255,255,0.16)');
      ctx.fillStyle = glassSheen;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.38)';
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.restore();
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function getQrCodeDataUrl(text) {
      try {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=0&data=${encodeURIComponent(text)}`;
        const response = await fetch(qrUrl);
        if (!response.ok) throw new Error('QR code fetch failed');
        const blob = await response.blob();
        return await blobToDataUrl(blob);
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawContainedImage(ctx, img, x, y, width, height, opacity = 1, focusX = 0.5, focusY = 0.5) {
      if (!img?.width || !img?.height) return;
      const scale = Math.max(width / img.width, height / img.height);
      const drawWidth = img.width * scale;
      const drawHeight = img.height * scale;
      const offsetX = (width - drawWidth) * Math.min(Math.max(focusX, 0), 1);
      const offsetY = (height - drawHeight) * Math.min(Math.max(focusY, 0), 1);
      const drawX = x + offsetX;
      const drawY = y + offsetY;

      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
      ctx.restore();
    }

    function drawRoundedRectPath(ctx, x, y, width, height, radius = 24) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawRoundedCoverImage(ctx, img, x, y, width, height, radius = 24, opacity = 1, focusX = 0.5, focusY = 0.5, zoom = 1) {
      if (!img?.width || !img?.height) return;
      const scale = Math.max(width / img.width, height / img.height) * zoom;
      const drawWidth = img.width * scale;
      const drawHeight = img.height * scale;
      const offsetX = (width - drawWidth) * Math.min(Math.max(focusX, 0), 1);
      const offsetY = (height - drawHeight) * Math.min(Math.max(focusY, 0), 1);
      const drawX = x + offsetX;
      const drawY = y + offsetY;

      ctx.save();
      drawRoundedRectPath(ctx, x, y, width, height, radius);
      ctx.clip();
      ctx.globalAlpha = opacity;
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
      ctx.restore();
    }

    function isMobileLayout() {
      return window.matchMedia('(max-width: 640px)').matches;
    }

    function getSaveButtonLabels() {
      return isMobileLayout()
        ? { idle: '保存到相册', busy: '正在保存...', error: '保存图片失败，请稍后再试。' }
        : { idle: '导出分享图', busy: '正在导出...', error: '导出分享图失败，请稍后再试。' };
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

      drawCenteredCanvasText(ctx, `接近度 ${snapshot.percent}%`, heroCardX + heroInnerInset + 124, statPillY + 32);

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';

      ctx.stroke();

    function setActionButtonState(buttonId, disabled, label) {
      const button = document.getElementById(buttonId);
      if (!button) return;
      button.disabled = disabled;
      if (label) button.textContent = label;
    }

    async function copyResultImage() {
      if (!latestResultSnapshot?.teamLabel) return;
      setActionButtonState('copyShareButton', true, '正在复制...');

      try {
        const blob = await buildShareImage(latestResultSnapshot);
        if (!blob) throw new Error('生成图片失败');

        if (navigator.clipboard?.write && window.ClipboardItem) {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          alert('分享图已复制到剪切板。');
        } else {
          alert('当前浏览器不支持直接复制图片，请使用导出分享图。');
        }
      } catch (error) {
        console.error(error);
        alert('复制分享图失败，请稍后再试。');
      } finally {
        setActionButtonState('copyShareButton', false, '复制分享图');
      }
    }

    async function downloadResultImage() {
      if (!latestResultSnapshot?.teamLabel) return;
      const labels = getSaveButtonLabels();
      setActionButtonState('downloadShareButton', true, labels.busy);

      try {
        const blob = await buildShareImage(latestResultSnapshot);
        if (!blob) throw new Error('生成图片失败');

        if (isMobileLayout() && navigator.share) {
          const file = new File([blob], 'cs-team-result.png', { type: 'image/png' });
          if (!navigator.canShare || navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: 'CS 主队测试结果',
              text: '保存到相册或分享给朋友'
            });
          } else {
            downloadBlob(blob, 'cs-team-result.png');
          }
        } else {
          downloadBlob(blob, 'cs-team-result.png');
        }
      } catch (error) {
        console.error(error);
        alert(labels.error);
      } finally {
        setActionButtonState('downloadShareButton', false, labels.idle);
      }
    }

    function getAnswerSummaryLines() {
      const baseLines = surveyData.questions.map((question, index) => {
        const answerIndex = answers[index];
        if (answerIndex == null) return null;
        return `${question.title.replace(/^\d+\.\s*/, '')}：${question.options[answerIndex].label}`;
      }).filter(Boolean);

      const extraLines = tiebreakerQuestions.map((question, index) => {
        const answerIndex = tiebreakerAnswers[index];
        if (answerIndex == null) return null;
        return `加试·${question.title}：${question.options[answerIndex].label}`;
      }).filter(Boolean);

      return [...baseLines, ...extraLines];
    }

        const forcedMatch = teamMatches.find(team => team.id === previewTeamId);
        if (forcedMatch) {
          const leadingSimilarity = teamMatches[0]?.similarity || forcedMatch.similarity || 0;
          const boostedMatch = {
            ...forcedMatch,
            similarity: Math.min(0.965, Math.max(forcedMatch.similarity || 0, leadingSimilarity + 0.01))
          };
          teamMatches = [boostedMatch, ...teamMatches.filter(team => team.id !== previewTeamId)];
        }

      const topMatch = teamMatches[0];

        if (!match) return '0.0';
        const rawPercent = Math.max(0, Math.min(96.5, (match.similarity || 0) * 100));

          <ul id="candidateList" style="margin:0;padding-left:18px;color:var(--muted);"></ul>
          <div class="share-inline-panel">
            <p class="share-inline-title">分享结果图</p>
            <p class="share-tip" style="margin:0;">一键复制或${isMobileLayout() ? '保存图片到相册' : '导出分享图'}，别人一眼就能扫二维码来测。</p>
            <div class="share-inline-actions">
              <button class="button secondary" id="copyShareButton">复制分享图</button>
              <button class="button" id="downloadShareButton">${saveLabels.idle}</button>
            </div>
          </div>
        </div>
      `);
      resultsContainer.appendChild(candidateCard);
      const candidateList = candidateCard.querySelector('#candidateList');
      teamMatches.slice(1, 4).forEach((team, index) => {
        const otherTheme = getTeamTheme(team.id);
        const item = createNode(`
          <li class="team-mini-row">
            <span class="team-mini-rank">${index + 2}</span>
            <span class="team-mini-logo-shell">
              ${getPrimaryMiniLogoPath(otherTheme) ? `<img class="team-mini-logo" style="--team-mini-logo-filter:${otherTheme.miniLogoFilter || 'drop-shadow(0 2px 6px rgba(0,0,0,0.24))'};" src="${getPrimaryMiniLogoPath(otherTheme)}" data-fallbacks="${getMiniLogoFallbacks(otherTheme)}" alt="${team.label} 队标" onerror="handleLogoError(this)">` : `<span style="font-size:11px;font-weight:800;color:var(--primary);">${otherTheme.badge || 'CS'}</span>`}
            </span>
            <span style="flex:1;">${team.label}</span>
            <strong style="color:var(--primary);">${getDisplayPercent(team, index + 1)}%</strong>
          </li>
        `);
        candidateList.appendChild(item);
      });

      surveyData.dimensions.filter(dimension => dimension.id !== 'temperature').forEach(dimension => {
        const maxPerQuestion = surveyData.questionMaxScore || 5;
        const totalPossible = getTotalQuestionWeight() * maxPerQuestion;
        const rawValue = dimensionScores[dimension.id] || 0;
        const normalized = Math.max(-totalPossible, Math.min(totalPossible, rawValue));
        const valueText = normalized === 0 ? '中庸' : normalized > 0 ? `偏向 ${dimension.left}` : `偏向 ${dimension.right}`;
        const halfRange = Math.abs(normalized) / totalPossible * 50;
        const fillLeft = normalized >= 0 ? 50 - halfRange : 50;
        const fillWidth = Math.abs(halfRange);

        const card = createNode(`
          <div class="result-item">
            <div class="dimension-labels">
              <span>${dimension.left}</span>
              <span>${dimension.right}</span>
            </div>
            <div class="dimension-track">
              <span class="dimension-center"></span>
              <span class="dimension-fill" style="left: ${fillLeft}%; width: ${fillWidth}%;"></span>
            </div>
            <span class="dimension-value">${valueText}（${Math.round(Math.abs(normalized) / totalPossible * 100)}%）</span>
          </div>
        `);
        resultsContainer.appendChild(card);
      });

      const shareTeamLabel = topMatch?.id === 'vitality' ? 'Vitality' : (topMatch?.label || '综合型');

      latestResultSnapshot = {
        teamId: topMatch?.id || null,
        teamLabel: shareTeamLabel,
        description: topMatch?.description || '你的观赛风格比较综合。',
        percent: topMatch ? getDisplayPercent(topMatch, 0) : '--',
        others: teamMatches.slice(1, 4).map((team, index) => ({ label: team.label, percent: getDisplayPercent(team, index + 1) })),
        answers: getAnswerSummaryLines(),
        theme,
        url: 'https://xiaofaneric.github.io/csti/'
      };

      document.getElementById('restartButton').addEventListener('click', () => {
        previewTeamId = null;
        hasStarted = false;
        currentPhase = 'base';
        currentIndex = 0;
        answers = new Array(surveyData.questions.length).fill(null);
        tiebreakerQuestions = [];
        tiebreakerAnswers = [];
        tiebreakerQuestionOrder = [];
        tiebreakerOptionOrders = [];
        questionOrder = [];
        optionOrders = [];
        latestResultSnapshot = null;
        renderStartScreen();
      });

      document.getElementById('copyShareButton').addEventListener('click', () => {
        copyResultImage();
      });

      document.getElementById('downloadShareButton').addEventListener('click', () => {
        downloadResultImage();
      });

      document.getElementById('randomResultButton').addEventListener('click', () => {
        showRandomPreview();
      });

      progressText.textContent = isMobileLayout() ? '' : '完成问卷';
      progressFill.style.width = '100%';
    }

    function showLoadError(message) {
      contentArea.innerHTML = `
        <div class="error">
          <p>加载问卷失败：${message}</p>
          <p>请确认 survey.json 与 index.html 在同一目录下，或使用本地服务器打开页面。</p>
          <p>推荐命令：<code>python -m http.server 8000</code></p>
        </div>
      `;
      progressText.textContent = '加载失败';
    }

    function getFreshSurveyUrl() {
      const separator = window.location.search ? '&' : '?';
      return `survey.json${separator}v=${Date.now()}`;
    }

    async function loadSurvey() {
      try {
        const response = await fetch(getFreshSurveyUrl(), {
          cache: 'no-store',
          headers: {
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            Pragma: 'no-cache'
          }
        });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        surveyData = await response.json();
        if (!surveyData.questions || !surveyData.teams) {
          throw new Error('survey.json 内容格式不正确。');
        }
        currentPhase = 'base';
        answers = new Array(surveyData.questions.length).fill(null);
        tiebreakerQuestions = [];
        tiebreakerAnswers = [];
        tiebreakerQuestionOrder = [];
        tiebreakerOptionOrders = [];
        questionOrder = [];
        optionOrders = [];
        renderStartScreen();
      } catch (error) {
        console.error(error);
        showLoadError(error.message || '未知错误');
      }
    }

    loadSurvey();
  </script>
</body>
</html>
