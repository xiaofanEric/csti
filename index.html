<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS 主队问卷</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1e6d2;
      --card: #ffffff;
      --card-alt: #f7efe2;
      --text: #111827;
      --muted: #4b5563;
      --primary: #1f3a70;
      --accent: #b9551e;
      --shadow: 0 10px 20px rgba(17, 24, 39, 0.08);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .title {
      font-size: clamp(1.8rem, 2.2vw, 2.6rem);
      line-height: 1.1;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 6px 0 0;
      max-width: 640px;
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 24px;
    }

    .progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .progress-text {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-bar {
      flex: 1;
      height: 12px;
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--primary);
      transition: width 0.25s ease;
    }

    .question-title {
      font-size: 1.2rem;
      margin: 0 0 18px;
      line-height: 1.5;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-button {
      background: var(--card-alt);
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 8px;
      padding: 16px 18px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
      min-height: 72px;
      display: flex;
      align-items: center;
    }

    .option-button:hover {
      background: #f4e7d5;
      border-color: rgba(31, 59, 112, 0.25);
      transform: translateY(-1px);
    }

    .option-button.selected {
      background: rgba(31, 59, 112, 0.12);
      border-color: rgba(31, 59, 112, 0.6);
      box-shadow: inset 0 0 0 1px rgba(31, 59, 112, 0.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .button {
      border: none;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 0.98rem;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 6px 12px rgba(17, 24, 39, 0.08);
      transition: background 0.2s ease;
    }

    .button.secondary {
      background: rgba(17, 24, 39, 0.06);
      color: var(--text);
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .results {
      display: grid;
      gap: 16px;
    }

    .result-item {
      border-radius: 10px;
      padding: 18px 20px;
      background: #f8f9fb;
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .result-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .dimension-row {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .dimension-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .dimension-track {
      position: relative;
      height: 14px;
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.08);
      overflow: hidden;
    }

    .dimension-center {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      background: rgba(17, 24, 39, 0.25);
      transform: translateX(-50%);
    }

    .dimension-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 8px;
      background: var(--primary);
      transition: width 0.3s ease, left 0.3s ease;
    }

    .dimension-value {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    .error {
      color: #ffd9d9;
      background: rgba(255, 74, 74, 0.08);
      border: 1px solid rgba(255, 74, 74, 0.18);
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
    }

    @media (max-width: 640px) {
      .card { padding: 20px; }
      .actions { justify-content: stretch; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1 class="title">CS 主队问卷</h1>
        <p class="subtitle">根据你的选择判断你更像哪种队伍风格，配合直播间梗让问卷更有味道。</p>
      </div>
      <div class="progress" aria-label="进度">
        <div class="progress-text" id="progressText">加载中…</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </header>

    <section class="card" id="surveyCard">
      <div id="contentArea">
        <p class="muted">正在读取问卷...</p>
      </div>
    </section>
  </main>

  <script>
    const contentArea = document.getElementById('contentArea');
    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');

    let surveyData = null;
    let currentIndex = 0;
    let answers = [];
    let dimensionScores = {};

    function createNode(html) {
      const template = document.createElement('template');
      template.innerHTML = html.trim();
      return template.content.firstChild;
    }

    function renderQuestion() {
      const question = surveyData.questions[currentIndex];
      const total = surveyData.questions.length;
      const completed = currentIndex;
      const percent = Math.round(((completed) / total) * 100);
      progressText.textContent = `第 ${currentIndex + 1} / ${total} 题`;
      progressFill.style.width = `${percent}%`;

      const optionsHtml = question.options.map((option, index) => {
        const selected = answers[currentIndex] === index ? 'selected' : '';
        return `<button type="button" class="option-button ${selected}" data-index="${index}">${option.label}</button>`;
      }).join('');

      contentArea.innerHTML = `
        <h2 class="question-title">${question.title}</h2>
        <div class="options" id="optionsContainer">${optionsHtml}</div>
        <div class="actions">
          <button class="button secondary" id="prevButton" ${currentIndex === 0 ? 'disabled' : ''}>上一题</button>
          <button class="button" id="nextButton">${currentIndex === total - 1 ? '提交结果' : '下一题'}</button>
        </div>
      `;

      document.querySelectorAll('.option-button').forEach(button => {
        button.addEventListener('click', () => {
          const selectedIndex = Number(button.dataset.index);
          answers[currentIndex] = selectedIndex;
          renderQuestion();
        });
      });

      document.getElementById('prevButton').addEventListener('click', () => {
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuestion();
        }
      });

      document.getElementById('nextButton').addEventListener('click', () => {
        if (answers[currentIndex] == null) {
          alert('请先选择一个选项再继续。');
          return;
        }
        if (currentIndex < surveyData.questions.length - 1) {
          currentIndex += 1;
          renderQuestion();
        } else {
          showResult();
        }
      });
    }

    function calculateScores() {
      dimensionScores = surveyData.dimensions.reduce((acc, dimension) => {
        acc[dimension.id] = 0;
        return acc;
      }, {});

      surveyData.questions.forEach((question, questionIndex) => {
        const answerIndex = answers[questionIndex];
        if (answerIndex == null) return;
        const optionScores = question.options[answerIndex].scores || {};
        surveyData.dimensions.forEach(dimension => {
          dimensionScores[dimension.id] += optionScores[dimension.id] || 0;
        });
      });
    }

    function normalizeScores() {
      const maxPerQuestion = 5;
      const totalPossible = surveyData.questions.length * maxPerQuestion;
      return surveyData.dimensions.reduce((acc, dimension) => {
        const rawValue = dimensionScores[dimension.id] || 0;
        acc[dimension.id] = (rawValue / totalPossible) * 5;
        return acc;
      }, {});
    }

    function calculateTeamMatches(userNormalized) {
      return surveyData.teams.map(team => {
        const profile = team.profile || {};
        const distance = surveyData.dimensions.reduce((acc, dimension) => {
          const userValue = userNormalized[dimension.id] || 0;
          const teamValue = profile[dimension.id] || 0;
          return acc + Math.abs(userValue - teamValue);
        }, 0);
        const similarity = Math.max(0, 1 - distance / (surveyData.dimensions.length * 10));
        return { ...team, similarity, distance };
      }).sort((a, b) => b.similarity - a.similarity);
    }

    function showResult() {
      calculateScores();
      const userNormalized = normalizeScores();
      const teamMatches = calculateTeamMatches(userNormalized);
      const topMatch = teamMatches[0];

      contentArea.innerHTML = `
        <h2 class="question-title">你的倾向性结果</h2>
        <div class="results" id="resultsContainer"></div>
        <div class="actions">
          <button class="button secondary" id="restartButton">重新开始</button>
        </div>
      `;

      const resultsContainer = document.getElementById('resultsContainer');

      if (topMatch) {
        const matchCard = createNode(`
          <div class="result-item">
            <h3 class="result-title">最匹配的队伍：${topMatch.label}</h3>
            <p class="result-description">${topMatch.description}</p>
            <p class="result-description">匹配度：${Math.round(topMatch.similarity * 100)}%</p>
          </div>
        `);
        resultsContainer.appendChild(matchCard);
      }

      const candidateCard = createNode(`
        <div class="result-item">
          <h3 class="result-title">备选队伍</h3>
          <ul id="candidateList" style="margin:0;padding-left:18px;color:var(--muted);"></ul>
        </div>
      `);
      resultsContainer.appendChild(candidateCard);
      const candidateList = candidateCard.querySelector('#candidateList');
      teamMatches.slice(1, 4).forEach(team => {
        const item = document.createElement('li');
        item.textContent = `${team.label} · 匹配度 ${Math.round(team.similarity * 100)}%`;
        candidateList.appendChild(item);
      });

      surveyData.dimensions.filter(dimension => dimension.id !== 'temperature').forEach(dimension => {
        const maxPerQuestion = 5;
        const totalPossible = surveyData.questions.length * maxPerQuestion;
        const rawValue = dimensionScores[dimension.id] || 0;
        const normalized = Math.max(-totalPossible, Math.min(totalPossible, rawValue));
        const valueText = normalized === 0 ? '中庸' : normalized > 0 ? `偏向 ${dimension.left}` : `偏向 ${dimension.right}`;
        const halfRange = Math.abs(normalized) / totalPossible * 50;
        const fillLeft = normalized >= 0 ? 50 - halfRange : 50;
        const fillWidth = Math.abs(halfRange);

        const card = createNode(`
          <div class="result-item">
            <div class="dimension-labels">
              <span>${dimension.left}</span>
              <span>${dimension.right}</span>
            </div>
            <div class="dimension-track">
              <span class="dimension-center"></span>
              <span class="dimension-fill" style="left: ${fillLeft}%; width: ${fillWidth}%;"></span>
            </div>
            <span class="dimension-value">${valueText}（${Math.round(Math.abs(normalized) / totalPossible * 100)}%）</span>
          </div>
        `);
        resultsContainer.appendChild(card);
      });

      document.getElementById('restartButton').addEventListener('click', () => {
        currentIndex = 0;
        answers = new Array(surveyData.questions.length).fill(null);
        renderQuestion();
      });

      progressText.textContent = '完成问卷';
      progressFill.style.width = '100%';
    }

    function showLoadError(message) {
      contentArea.innerHTML = `
        <div class="error">
          <p>加载问卷失败：${message}</p>
          <p>请确认 survey.json 与 index.html 在同一目录下，或使用本地服务器打开页面。</p>
          <p>推荐命令：<code>python -m http.server 8000</code></p>
        </div>
      `;
      progressText.textContent = '加载失败';
    }

    async function loadSurvey() {
      try {
        const response = await fetch('survey.json');
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        surveyData = await response.json();
        if (!surveyData.questions || !surveyData.teams) {
          throw new Error('survey.json 内容格式不正确。');
        }
        answers = new Array(surveyData.questions.length).fill(null);
        renderQuestion();
      } catch (error) {
        console.error(error);
        showLoadError(error.message || '未知错误');
      }
    }

    loadSurvey();
  </script>
</body>
</html>
